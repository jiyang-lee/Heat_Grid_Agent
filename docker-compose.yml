services:
  heatgrid-pgvector:
    image: pgvector/pgvector:pg16
    container_name: heatgrid-pgvector
    environment:
      POSTGRES_DB: heatgrid_ops
      POSTGRES_USER: heatgrid
      POSTGRES_PASSWORD: heatgrid
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - heatgrid_ops_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heatgrid -d heatgrid_ops"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  heatgrid_ops_pgdata:
