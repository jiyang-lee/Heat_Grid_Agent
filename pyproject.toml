[project]
name = "heat-grid-agent"
version = "0.1.0"
description = "Frozen legacy workspace for HeatGrid Agent branch outputs"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.138.0",
    "joblib>=1.5.3",
    "jsonschema>=4.26.0",
    "langchain>=1.3.11",
    "langchain-core>=1.4.8",
    "langchain-openai>=1.3.3",
    "langgraph>=1.2.6",
    "lightgbm>=4.6.0",
    "pandas>=2.2.0",
    "pyarrow>=24.0.0",
    "scikit-learn>=1.9.0",
    "uvicorn>=0.49.0",
]

[dependency-groups]
dev = [
    "pglast>=7.14",
    "pytest>=8.0.0",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
