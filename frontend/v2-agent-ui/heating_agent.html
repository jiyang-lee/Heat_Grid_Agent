<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>지역난방 보조운영 에이전트 · 세종 1생활권</title>
<style>
  /* ===== 기본 리셋 & 테마 변수 ===== */
  :root{
    --cyan:#00e5ff;        /* 포인트 시안 */
    --blue:#2979ff;        /* 포인트 파랑 */
    --urgent:#ff1744;      /* 긴급(빨강) */
    --caution:#ffc400;     /* 주의(노랑) */
    --normal:#00e676;      /* 정상(초록) */
    --glass:rgba(14,26,54,0.55);
    --mono:"Consolas","SFMono-Regular","Menlo","D2Coding",monospace;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    /* 짙은 남색 그라데이션 배경 */
    background:
      radial-gradient(1200px 700px at 20% -10%, #16244d 0%, transparent 60%),
      radial-gradient(1000px 800px at 110% 20%, #10306a 0%, transparent 55%),
      linear-gradient(160deg,#050a1c 0%, #071233 55%, #030614 100%);
    color:#dbe7ff;
    font-family:"Segoe UI","Malgun Gothic",sans-serif;
    min-height:100vh; padding:14px;
    -webkit-font-smoothing:antialiased;
  }
  .mono{ font-family:var(--mono); }

  /* ===== 헤더 ===== */
  header{
    display:flex; align-items:center; gap:16px;
    padding:12px 18px; margin-bottom:14px;
    background:var(--glass); backdrop-filter:blur(10px);
    border:1px solid rgba(0,229,255,0.35); border-radius:14px;
    box-shadow:0 0 24px rgba(0,229,255,0.12), inset 0 0 30px rgba(0,60,120,0.25);
  }
  .logo{ width:42px; height:42px; flex:0 0 auto; filter:drop-shadow(0 0 6px var(--cyan)); }
  .titlewrap h1{ font-size:19px; letter-spacing:.5px; color:#eaf4ff; white-space:nowrap; }
  .titlewrap .sub{ font-size:11px; color:#7fa8d8; font-family:var(--mono); letter-spacing:1px; }
  .summary{ margin-left:auto; display:flex; gap:10px; flex-wrap:wrap; }
  .badge{
    display:flex; align-items:center; gap:7px;
    padding:7px 13px; border-radius:10px; font-family:var(--mono); font-size:13px;
    background:rgba(4,12,30,0.6); border:1px solid rgba(255,255,255,0.08);
  }
  .badge b{ font-size:16px; }
  .dot{ width:9px; height:9px; border-radius:50%; box-shadow:0 0 8px currentColor; }
  .u{ color:var(--urgent); } .c{ color:var(--caution); } .n{ color:var(--normal); }
  /* 좁은 화면: 헤더 줄바꿈 + 요약 배지 아래로 */
  @media(max-width:620px){
    header{ flex-wrap:wrap; }
    .titlewrap h1{ font-size:16px; white-space:normal; }
    .summary{ margin-left:0; width:100%; }
    .badge{ flex:1 1 auto; justify-content:center; }
  }

  /* ===== 2단 그리드 (메인 + 보조창) ===== */
  .wrap{ display:grid; grid-template-columns:1fr 380px; gap:14px; align-items:stretch; }
  @media(max-width:940px){ .wrap{ grid-template-columns:1fr; } }

  .panel{
    background:var(--glass); backdrop-filter:blur(10px);
    border:1px solid rgba(0,229,255,0.30); border-radius:14px;
    box-shadow:0 0 26px rgba(0,60,140,0.20), inset 0 0 40px rgba(0,40,90,0.20);
    position:relative; overflow:hidden;
  }
  .panel-head{
    display:flex; align-items:center; gap:10px;
    padding:11px 16px; border-bottom:1px solid rgba(0,229,255,0.18);
    font-family:var(--mono); font-size:13px; letter-spacing:1px; color:#bfe4ff;
  }
  .panel-head .tag{ font-size:10px; padding:2px 8px; border-radius:20px; border:1px solid var(--cyan); color:var(--cyan); }
  .btn-back{
    margin-left:auto; cursor:pointer; font-family:var(--mono); font-size:12px;
    padding:5px 12px; border-radius:8px; color:#cdefff;
    background:rgba(0,120,200,0.18); border:1px solid rgba(0,229,255,0.4);
    transition:.15s;
  }
  .btn-back:hover{ background:rgba(0,180,255,0.3); box-shadow:0 0 12px var(--cyan); }
  .hidden{ display:none !important; }

  /* ===== SVG 무대 ===== */
  .stage{ width:100%; display:block; }
  .stage svg{ width:100%; height:auto; display:block; }
  .clickable{ cursor:pointer; }

  /* 긴급 pulse (건물/기계) */
  @keyframes pulseUrg{
    0%,100%{ filter:drop-shadow(0 0 3px var(--urgent)); }
    50%    { filter:drop-shadow(0 0 16px var(--urgent)); }
  }
  .pulse{ animation:pulseUrg 1.15s ease-in-out infinite; transform-box:fill-box; }
  .sel{ filter:drop-shadow(0 0 14px var(--cyan)); }

  /* ===== 보조창 리스트 ===== */
  .aside-body{ padding:10px; display:flex; flex-direction:column; gap:8px; max-height:600px; overflow:auto; }
  .row{
    display:flex; align-items:center; gap:10px; padding:10px 12px;
    border-radius:11px; cursor:pointer; transition:.14s;
    background:rgba(6,16,38,0.55); border:1px solid rgba(255,255,255,0.06);
  }
  .row:hover{ border-color:var(--cyan); box-shadow:0 0 14px rgba(0,229,255,0.25); transform:translateX(2px); }
  .row.active{ border-color:var(--cyan); box-shadow:0 0 16px rgba(0,229,255,0.4); background:rgba(0,60,120,0.35); }
  .rank{
    width:26px; height:26px; flex:0 0 auto; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-weight:700; font-size:13px;
    background:rgba(0,0,0,0.35); border:1px solid rgba(0,229,255,0.4); color:var(--cyan);
  }
  .row .info{ flex:1 1 auto; min-width:0; }
  .row .info .nm{ font-size:13.5px; color:#eaf3ff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .row .info .ad{ font-size:11px; color:#7f9ecb; font-family:var(--mono); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .row .info .ds{ font-size:11px; color:#8fb3dd; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cnt{ display:flex; gap:5px; flex:0 0 auto; }
  .pill{ font-family:var(--mono); font-size:11px; padding:2px 7px; border-radius:8px; border:1px solid currentColor; }
  .chip-st{
    flex:0 0 auto; font-family:var(--mono); font-size:11px; font-weight:700;
    padding:3px 9px; border-radius:20px; color:#04121f;
  }
  .st-urgent{ background:var(--urgent); box-shadow:0 0 10px var(--urgent); }
  .st-caution{ background:var(--caution); box-shadow:0 0 10px var(--caution); }
  .st-normal{ background:var(--normal); box-shadow:0 0 10px var(--normal); }
  .sensor-off{ opacity:.45; }
  .tag-off{ font-family:var(--mono); font-size:10px; color:#8aa2c4; border:1px dashed #56708f; padding:1px 6px; border-radius:6px; }
  .empty{ text-align:center; color:#6f90bd; font-family:var(--mono); font-size:12px; padding:26px 10px; }

  /* 기계실 단지 카드 */
  .aside-meta{ padding:12px 16px; border-bottom:1px solid rgba(0,229,255,0.15); }
  .aside-meta .bn{ font-size:16px; color:#eaf4ff; }
  .aside-meta .ba{ font-size:12px; color:#84a6d4; font-family:var(--mono); margin-top:3px; }
  .statgrid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
  .stat{ background:rgba(4,12,30,0.5); border:1px solid rgba(0,229,255,0.14); border-radius:9px; padding:7px 10px; }
  .stat .k{ font-size:10px; color:#7f9ecb; font-family:var(--mono); }
  .stat .v{ font-size:14px; color:#dff0ff; font-family:var(--mono); margin-top:2px; }
  .stat.full{ grid-column:1 / -1; }
  .stat .v.sm{ font-size:12px; line-height:1.4; }

  .legend{ display:flex; gap:14px; padding:8px 16px; font-family:var(--mono); font-size:11px; color:#9db8de; flex-wrap:wrap; border-top:1px solid rgba(0,229,255,0.12); }
  .legend span{ display:flex; align-items:center; gap:6px; }
  .legend .note{ color:#6f90bd; }
</style>
</head>

/* ---------- CSV 행 → 단지 객체 ---------- */
const SENSOR_KEYS = ['outdoor','space','dhw','dhwStore','heatMeter','supRet'];
const BUILDINGS = ROWS.map(r=>{
  const sensors={};
  SENSOR_KEYS.forEach((k,i)=> sensors[k]= r[17][i]==='1');
  return {
    id:r[0], name:r[1], zone:r[2], dong:r[3], village:r[4],
    addr:'세종특별자치시 '+r[5], lat:r[6], lng:r[7],
    households:r[8], buildings:r[9], gfa:r[10],
    privMonth:r[11], mgmtMonth:r[12], unit:r[13],
    cfgKo:CFG[r[14]], groupsKo:GRP[r[15]], sensorCols:r[16], sensors,
  };
});

/* ---------- 상태(데모) 산출 ----------
   실제 고장 데이터가 없으므로, README가 '열수요 대리 지표'로 제시한
   총관리비 단가(원/㎡)를 내림차순 정렬해 상위=긴급, 다음=주의, 나머지=정상.
   → 결정론적이라 새로고침해도 동일. UI에 '데모'임을 명시. */
(function assignTier(){
  const sorted=[...BUILDINGS].sort((a,b)=> b.unit - a.unit);
  sorted.forEach((b,i)=> b.tier = i<6 ? 'urgent' : i<15 ? 'caution' : 'normal');
  // 기계별 상태: 종합상태(worst)가 tier와 일치하도록 대표 설비에 배정.
  // 상태는 '감시 가능한(센서 있는)' 설비에만 준다 → 도면/카운트가 일관됨.
  BUILDINGS.forEach(b=>{
    const st={}; MACHINES.forEach(m=>st[m.key]='normal');
    if(b.tier!=='normal'){
      const cand=MACHINES.filter(m=>machineMonitored(b,m)).map(m=>m.key); // 감시 가능 설비
      const f1=cand[b.id % cand.length];                       // 대표 설비 1
      st[f1]=b.tier;
      const f2=cand[(b.id*3+2) % cand.length];                 // 대표 설비 2
      if(f2!==f1) st[f2]= b.tier==='urgent' ? 'caution' : 'normal';
    }
    b.st=st;
  });
})();

/* 종합상태 = 기계 중 worst / 상태별 기계 수 */
function overall(b){ return b.tier; }
function counts(b){
  const c={urgent:0,caution:0,normal:0};
  Object.values(b.st).forEach(s=>c[s]++);
  return c;
}
/* 설비의 센서 탑재 여부(감시 가능성) */
function machineMonitored(b,m){
  if(!m.sens) return true;                    // 공통 설비
  return m.sens.some(k=> b.sensors[k]);       // 관련 센서 중 하나라도 존재
}

/* ---------- 지도 좌표(위경도) → 아이소 그리드 ---------- */
const LAT=BUILDINGS.map(b=>b.lat), LNG=BUILDINGS.map(b=>b.lng);
const latMin=Math.min(...LAT), latMax=Math.max(...LAT);
const lngMin=Math.min(...LNG), lngMax=Math.max(...LNG);
const hhMin=Math.min(...BUILDINGS.map(b=>b.households)), hhMax=Math.max(...BUILDINGS.map(b=>b.households));
const SPAN=13;
function gridOf(b){
  // 경도→gx(동쪽=앞쪽 오른쪽), 위도→gy(북쪽=뒤쪽). 실제 지리 배치 유지
  return {
    gx:(b.lng-lngMin)/(lngMax-lngMin)*SPAN,
    gy:(latMax-b.lat)/(latMax-latMin)*SPAN,
  };
}
// 세대수 → 건물 높이(규모 시각화)
function heightOf(b){ return 22 + (b.households-hhMin)/(hhMax-hhMin)*62; }

/* ---------- 색상 유틸 ---------- */
function shade(hex,f){
  const n=parseInt(hex.slice(1),16);
  const r=Math.round(((n>>16)&255)*f), g=Math.round(((n>>8)&255)*f), b=Math.round((n&255)*f);
  return `rgb(${r},${g},${b})`;
}
function won(n){ // 원 단위 → 억/만 축약
  if(n>=1e8) return (n/1e8).toFixed(1)+'억';
  if(n>=1e4) return Math.round(n/1e4)+'만';
  return String(n);
}

/* ---------- 아이소 박스 기하 ---------- */
function boxGeom(gx,gy,w,d,h){
  const bA=iso(gx,gy), bB=iso(gx+w,gy), bC=iso(gx+w,gy+d), bD=iso(gx,gy+d);
  const up=p=>({x:p.x, y:p.y-h});
  const tA=up(bA), tB=up(bB), tC=up(bC), tD=up(bD);
  const P=p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`;
  return {
    top  :`${P(tA)} ${P(tB)} ${P(tC)} ${P(tD)}`,
    right:`${P(tB)} ${P(tC)} ${P(bC)} ${P(bB)}`,
    left :`${P(tD)} ${P(tC)} ${P(bC)} ${P(bD)}`,
    ctop :{ x:(tA.x+tC.x)/2, y:(tA.y+tC.y)/2 },
    cbase:{ x:(bA.x+bC.x)/2, y:(bA.y+bC.y)/2 },
  };
}
function boxSVG(g, color, {cls='', attr='', topStroke='rgba(0,229,255,0.35)'}={}){
  return `<g class="${cls}" ${attr}>
    <polygon points="${g.left}"  fill="${shade(color,0.42)}" stroke="rgba(0,0,0,0.35)" stroke-width="0.6"/>
    <polygon points="${g.right}" fill="${shade(color,0.60)}" stroke="rgba(0,0,0,0.35)" stroke-width="0.6"/>
    <polygon points="${g.top}"   fill="${shade(color,0.95)}" stroke="${topStroke}" stroke-width="1"/>
  </g>`;
}
function chipSVG(cx, cy, text, status){
  const c = STATUS[status].color;
  const w = text.length * 12 + 20;
  return `<g transform="translate(${cx},${cy})" style="pointer-events:none">
    <rect x="${-w/2}" y="-13" width="${w}" height="24" rx="7"
          fill="rgba(4,10,26,0.85)" stroke="${c}" stroke-width="1.4"/>
    <circle cx="${-w/2+11}" cy="-1" r="4" fill="${c}"/>
    <text x="6" y="4" text-anchor="middle" font-family="var(--mono)" font-size="12.5"
          font-weight="700" fill="${c}">${text}</text>
  </g>`;
}

/* =====================================================================
   렌더링
   ===================================================================== */
const state = { view:'city', selBld:null, selMachine:null };

/* ---- 헤더 요약 배지: 단지 종합상태 기준 집계 ---- */
function renderSummary(){
  const c={urgent:0,caution:0,normal:0};
  BUILDINGS.forEach(b=>c[overall(b)]++);
  document.getElementById('summary').innerHTML = `
    <div class="badge"><i class="dot u"></i>긴급 <b class="u">${c.urgent}</b></div>
    <div class="badge"><i class="dot c"></i>주의 <b class="c">${c.caution}</b></div>
    <div class="badge"><i class="dot n"></i>정상 <b class="n">${c.normal}</b></div>`;
}

/* ---- (A) 도시(지도) 화면 ---- */
function renderCity(){
  const OX=450, OY=70;
  // 뒤→앞: (gx+gy) 오름차순
  const items=BUILDINGS.map(b=>({b, g:gridOf(b)})).sort((p,q)=>(p.g.gx+p.g.gy)-(q.g.gx+q.g.gy));
  let out='';
  items.forEach(({b,g})=>{
    const ov=overall(b);
    const geo=boxGeom(g.gx,g.gy,0.5,0.5,heightOf(b));
    const isU=ov==='urgent', isSel=state.selBld===b.id;
    const cls=`clickable ${isU?'pulse':''} ${isSel?'sel':''}`;
    out += boxSVG(geo, STATUS[ov].color, { cls, attr:`data-bld="${b.id}"` });
    // 마커 번호(substation_id) — 항상 표기
    out += `<text x="${geo.ctop.x}" y="${geo.ctop.y+3}" text-anchor="middle"
      font-family="var(--mono)" font-size="9" font-weight="700" fill="#04121f"
      style="pointer-events:none">${b.id}</text>`;
    // 상태 칩: 긴급 또는 선택된 단지만(과밀 방지)
    if(isU || isSel){
      out += `<g data-bld="${b.id}" class="clickable">${chipSVG(geo.ctop.x, geo.ctop.y-16, STATUS[ov].ko, ov)}</g>`;
    }
    // 선택 단지는 이름도 표기
    if(isSel){
      out += `<text x="${geo.cbase.x}" y="${geo.cbase.y+16}" text-anchor="middle"
        font-family="var(--mono)" font-size="11" fill="#bfe4ff" style="pointer-events:none">${b.id}. ${b.name}</text>`;
    }
  });
  document.getElementById('cityStage').innerHTML =
    `<svg viewBox="0 0 900 560" preserveAspectRatio="xMidYMid meet">
       <g transform="translate(${OX},${OY})">${villageLabels()}${out}</g>
     </svg>`;
}

/* 마을(생활권) 이름을 클러스터 근처에 은은히 표기 */
function villageLabels(){
  const byV={};
  BUILDINGS.forEach(b=>{ (byV[b.village]=byV[b.village]||[]).push(b); });
  let s='';
  Object.entries(byV).forEach(([v,arr])=>{
    // 마을 중심 위경도 → 그리드 → 화면 좌표
    const g={ gx:arr.reduce((a,b)=>a+gridOf(b).gx,0)/arr.length,
              gy:arr.reduce((a,b)=>a+gridOf(b).gy,0)/arr.length };
    const p=iso(g.gx,g.gy);
    s+=`<text x="${p.x.toFixed(0)}" y="${(p.y-70).toFixed(0)}" text-anchor="middle"
      font-family="var(--mono)" font-size="12" fill="rgba(0,229,255,0.55)"
      style="pointer-events:none">${v} (${arr[0].dong})</text>`;
  });
  return s;
}

/* ---- (B) 기계실 화면 ---- */
function renderRoom(){
  const b=BUILDINGS.find(x=>x.id===state.selBld); if(!b) return;
  const OX=360, OY=140;
  const geomOf={}; MACHINES.forEach(m=> geomOf[m.key]=boxGeom(m.gx,m.gy,m.w,m.d,m.h));
  // 배관 먼저(바닥)
  let pipes='';
  PIPES.forEach(([a,c])=>{
    const p=geomOf[a].cbase, q=geomOf[c].cbase;
    pipes+=`<line x1="${p.x}" y1="${p.y}" x2="${q.x}" y2="${q.y}" stroke="rgba(0,229,255,0.28)" stroke-width="4" stroke-linecap="round"/>
      <line x1="${p.x}" y1="${p.y}" x2="${q.x}" y2="${q.y}" stroke="rgba(41,121,255,0.5)" stroke-width="1.4" stroke-dasharray="3 6"/>`;
  });
  // 설비 박스: (gx+gy) 오름차순
  const order=[...MACHINES].sort((m,n)=>(m.gx+m.gy)-(n.gx+n.gy));
  let boxes='';
  order.forEach(m=>{
    const s=b.st[m.key];
    const g=geomOf[m.key];
    const mon=machineMonitored(b,m);
    const isU=s==='urgent', isSel=state.selMachine===m.key;
    const cls=`clickable ${isU?'pulse':''} ${isSel?'sel':''}`;
    // 센서 미탑재 설비는 회색으로 표현(감시 불가)
    const color = mon ? STATUS[s].color : '#5b6b86';
    boxes+=boxSVG(g, color, { cls, attr:`data-machine="${m.key}"` });
    boxes+=`<g data-machine="${m.key}" class="clickable">${chipSVG(g.ctop.x, g.ctop.y-12, mon?STATUS[s].ko:'센서없음', mon?s:'normal')}</g>`;
    boxes+=`<text x="${g.cbase.x}" y="${g.cbase.y+16}" text-anchor="middle"
      font-family="var(--mono)" font-size="10.5" fill="#9db8de" style="pointer-events:none">${m.name}</text>`;
  });
  document.getElementById('roomStage').innerHTML =
    `<svg viewBox="0 0 900 560" preserveAspectRatio="xMidYMid meet">
       <g transform="translate(${OX},${OY})">${pipes}${boxes}</g>
     </svg>`;
}

/* ---- 보조창: 지도(수리 우선순위) ---- */
function renderAsideCity(){
  document.getElementById('asideTitle').textContent='수리 우선순위';
  document.getElementById('asideTag').textContent='PRIORITY';
  document.getElementById('asideMeta').innerHTML='';
  // 종합상태 정상 제외, [긴급 수 → 주의 수 → 관리비단가] 내림차순
  const list=BUILDINGS.filter(b=>overall(b)!=='normal').map(b=>({b,c:counts(b),ov:overall(b)}))
    .sort((x,y)=> y.c.urgent-x.c.urgent || y.c.caution-x.c.caution || y.b.unit-x.b.unit);
  const body=document.getElementById('asideBody');
  if(!list.length){ body.innerHTML='<div class="empty">모든 단지 정상 운영 중</div>'; return; }
  body.innerHTML=list.map((it,i)=>{
    const active=state.selBld===it.b.id?'active':'';
    return `<div class="row ${active}" data-bld="${it.b.id}" title="${it.b.name}">
      <div class="rank">${i+1}</div>
      <div class="info">
        <div class="nm">${it.b.id}. ${it.b.name}</div>
        <div class="ad">${it.b.addr}</div>
      </div>
      <div class="cnt">
        <span class="pill u">긴급 ${it.c.urgent}</span>
        <span class="pill c">주의 ${it.c.caution}</span>
      </div>
      <div class="chip-st st-${it.ov}">${STATUS[it.ov].ko}</div>
    </div>`;
  }).join('');
}

/* ---- 보조창: 기계실(단지 카드 + 설비 목록) ---- */
function renderAsideRoom(){
  const b=BUILDINGS.find(x=>x.id===state.selBld);
  document.getElementById('asideTitle').textContent='단지 · 설비 상세';
  document.getElementById('asideTag').textContent='DETAIL';
  // 실데이터 카드
  document.getElementById('asideMeta').innerHTML=`<div class="aside-meta">
    <div class="bn">${b.id}. ${b.name}</div>
    <div class="ba">${b.addr}</div>
    <div class="statgrid">
      <div class="stat full"><div class="k">PreDist 설비 구성 · 센서 ${b.sensorCols}열</div><div class="v sm">${b.cfgKo} · ${b.groupsKo}</div></div>
    </div>
  </div>`;
  // 설비 목록: 심각도 높은 순
  const order=[...MACHINES].sort((m,n)=> sev(b.st[n.key])-sev(b.st[m.key]));
  document.getElementById('asideBody').innerHTML=order.map(m=>{
    const s=b.st[m.key];
    const mon=machineMonitored(b,m);
    const active=state.selMachine===m.key?'active':'';
    const right = mon ? `<div class="chip-st st-${s}">${STATUS[s].ko}</div>`
                      : `<span class="tag-off">센서 미탑재</span>`;
    return `<div class="row ${active} ${mon?'':'sensor-off'}" data-machine="${m.key}">
      <div class="info"><div class="nm">${m.name}</div><div class="ds">${m.desc}</div></div>
      ${right}
    </div>`;
  }).join('');
}

/* =====================================================================
   상태 전환 & 이벤트
   ===================================================================== */
function render(){
  renderSummary();
  const city=state.view==='city';
  document.getElementById('cityStage').classList.toggle('hidden', !city);
  document.getElementById('roomStage').classList.toggle('hidden', city);
  document.getElementById('btnBack').classList.toggle('hidden', city);
  document.getElementById('mainTitle').textContent = city ? '단지 관제 · CITY MAP' : '기계실 관제 · MACHINE ROOM';
  document.getElementById('mainTag').textContent   = city ? '31 SITES' : '7 UNITS';
  document.getElementById('legendNote').textContent = city
    ? '· 상태=총관리비 단가(대리 열부하) 기반 데모 · 위치=실제 위경도'
    : '· 회색=해당 PreDist 센서 미탑재(감시 불가)';
  if(city){ renderCity(); renderAsideCity(); }
  else    { renderRoom(); renderAsideRoom(); }
}
function enterBuilding(id){ state.view='room'; state.selBld=id; state.selMachine=null; render(); }
function backToCity(){ state.view='city'; state.selMachine=null; render(); }
function selectMachine(key){ state.selMachine = state.selMachine===key ? null : key; render(); }

function stageClick(e){
  const bEl=e.target.closest('[data-bld]');
  const mEl=e.target.closest('[data-machine]');
  if(state.view==='city' && bEl){ enterBuilding(+bEl.getAttribute('data-bld')); }
  else if(state.view==='room' && mEl){ selectMachine(mEl.getAttribute('data-machine')); }
}
function asideClick(e){
  const row=e.target.closest('.row'); if(!row) return;
  if(state.view==='city' && row.dataset.bld){ enterBuilding(+row.dataset.bld); }
  else if(state.view==='room' && row.dataset.machine){ selectMachine(row.dataset.machine); }
}
document.getElementById('cityStage').addEventListener('click', stageClick);
document.getElementById('roomStage').addEventListener('click', stageClick);
document.getElementById('asideBody').addEventListener('click', asideClick);
document.getElementById('btnBack').addEventListener('click', backToCity);

render();
</script>
