name: heatgrid_ops_v0_handoff

services:
  postgres:
    image: postgres:16-alpine
    container_name: heatgrid_ops_v0_handoff_postgres
    environment:
      POSTGRES_USER: heatgrid
      POSTGRES_PASSWORD: heatgrid
      POSTGRES_DB: heatgrid_ops
    ports:
      - "${HEATGRID_PG_PORT:-55432}:5432"
    volumes:
      - heatgrid_ops_v0_handoff_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
      - ./queries:/handoff/queries:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heatgrid -d heatgrid_ops"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  heatgrid_ops_v0_handoff_pgdata:
