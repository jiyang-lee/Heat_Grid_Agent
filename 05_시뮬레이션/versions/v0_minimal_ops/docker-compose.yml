services:
  postgres:
    image: postgres:16-alpine
    container_name: heatgrid_ops_postgres
    environment:
      POSTGRES_USER: heatgrid
      POSTGRES_PASSWORD: heatgrid
      POSTGRES_DB: heatgrid_ops
    ports:
      - "55432:5432"
    volumes:
      - heatgrid_ops_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heatgrid -d heatgrid_ops"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  heatgrid_ops_pgdata:
