<svg viewBox="0 0 602 198" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="V. 검증 스냅샷 (4143cd1)">

  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--color-text-secondary,#57606a)"/>
    </marker>
  </defs>


  <style>
    svg{--acc-src:#3b6db5;--acc-src-bg:#eaf1fb;--acc-mine:#2e9e6b;--acc-mine-bg:#e8f6ef;
        --ink:var(--color-text-primary,#1f2328);--ink2:var(--color-text-secondary,#57606a);
        --card:var(--color-background-primary,#ffffff);--line:var(--color-border-secondary,#d0d7de);}
    @media (prefers-color-scheme:dark){svg{--acc-src-bg:#16263d;--acc-mine-bg:#10301f;--card:#0d1117;--line:#30363d;}}
    text{font-family:var(--font-sans,system-ui);fill:var(--ink);}
    .h{font-size:16px;font-weight:500;}
    .t{font-size:12.5px;font-weight:500;}
    .s{font-size:11px;fill:var(--ink2);}
    .box{fill:var(--card);stroke:var(--line);stroke-width:1.2;}
    .src{fill:var(--acc-src-bg);stroke:var(--acc-src);stroke-width:1.2;}
    .mine{fill:var(--acc-mine-bg);stroke:var(--acc-mine);stroke-width:1.2;}
    .edge{stroke:var(--ink2);stroke-width:1.5;fill:none;marker-end:url(#ah);}
  </style>

<text x="20" y="30" class="h">V. 검증 스냅샷 (4143cd1)</text>
<path class="edge" d="M190,95.0 L214,95.0"/>
<path class="edge" d="M386,95.0 L410,95.0"/>
<rect class="box" x="20" y="64" width="170" height="62" rx="8"/>
<text x="105.0" y="89" class="t" text-anchor="middle">전 사이클 재실행</text>
<text x="105.0" y="107" class="s" text-anchor="middle">재현성</text>
<rect class="mine" x="216" y="64" width="170" height="62" rx="8"/>
<text x="301.0" y="89" class="t" text-anchor="middle">mock→학습→추론</text>
<text x="301.0" y="107" class="s" text-anchor="middle">→에이전트</text>
<rect class="mine" x="412" y="64" width="170" height="62" rx="8"/>
<text x="497.0" y="89" class="t" text-anchor="middle">pytest</text>
<text x="497.0" y="107" class="s" text-anchor="middle">6 passed</text>
<text x="20" y="189" class="s">목데이터 한 사이클 재현 + 전처리 테스트 통과</text>
</svg>